<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <header>
<h1>Simple form</h1>
    </header>
    <form action="submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required placeholder="enter your name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email"><br><br>
        <label for="Password">Password:</label>
        <input type="password" name="password" id="password" required placeholder="Enter your password"><br><br>
        <label for="dob">DOB:</label>
        <input type="date" name="dob" id="dob" required min="1995-05-05" max="2026-05-05">
        <br><br>
        <input type="submit" value="Submit">
    </form>
    </body>
</html>
